<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NHF Netzmanagement • Build 8.5</title>
<meta name="theme-color" content="#1e6b1e">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
body { font-family: 'Inter', sans-serif; background: #f3f4f6; user-select: none; }
.nhf-green { color: #1e6b1e; }
.nhf-bg-green { background-color: #1e6b1e; }
.nhf-orange { color: #ff6600; }
.nhf-bg-orange { background-color: #ff6600; }
.btn-active:active { transform: scale(0.97); }
.toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:#1f2937; color:white; padding:0.75rem 1.5rem; border-radius:1rem; font-size:0.7rem; font-weight:700; z-index:300; opacity:0; transition:opacity 0.3s; }
.warn-badge { background: #fef3c7; border: 1px solid #f59e0b; }
</style>
</head>
<body>

<div id="toast-el" class="toast">STATUS</div>

<div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-gray-50 shadow-2xl">

<!-- LOGIN VIEW (kurz gehalten) -->
<div id="view-login" class="view-panel flex-grow flex flex-col justify-center p-8 bg-white text-center">
  <div class="mb-8">
    <div class="w-full py-6 px-4 rounded-3xl flex flex-col items-center justify-center mb-3 shadow-lg" style="background:linear-gradient(135deg,#1e6b1e,#2d8a2d)">
      <h1 class="text-white text-4xl font-black tracking-tighter">NHF</h1>
      <p class="text-green-200 text-xs font-semibold tracking-[3px] mt-1">NETZMANAGEMENT</p>
    </div>
    <h1 class="text-xl font-extrabold tracking-tight uppercase nhf-green">Service Login</h1>
  </div>

  <div class="space-y-4">
    <input type="text" id="l-user" placeholder="Benutzername" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none">
    <input type="password" id="l-pass" placeholder="Passwort" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none">
    <button onclick="handleLogin()" class="w-full nhf-bg-orange text-white font-bold py-4 rounded-2xl shadow-lg uppercase text-xs tracking-widest">Anmelden</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="view-dashboard" class="view-panel hidden flex-grow flex flex-col">
  <header class="p-5 border-b flex justify-between items-center sticky top-0 z-10 pt-safe shadow-md" style="background:linear-gradient(135deg,#1e6b1e,#2d8a2d)">
    <div>
      <h2 class="text-lg font-extrabold text-white">Objekt-Übersicht</h2>
    </div>
    <button onclick="logout()" class="p-2.5 bg-white/20 text-white rounded-xl">Abmelden</button>
  </header>

  <div class="p-3 bg-white border-b flex gap-2">
    <input type="text" id="search-bar" oninput="renderObjectList()" placeholder="Objekt suchen..." class="flex-grow p-3 bg-gray-50 border rounded-xl text-sm outline-none">
  </div>

  <div id="object-list" class="p-4 space-y-3 overflow-y-auto flex-grow"></div>
</div>

<!-- DETAIL VIEW -->
<div id="view-detail" class="view-panel hidden flex-grow flex flex-col">
  <header class="p-5 border-b flex items-center gap-3 sticky top-0 z-10 pt-safe shadow-md" style="background:linear-gradient(135deg,#1e6b1e,#2d8a2d)">
    <button onclick="showView('view-dashboard')" class="p-2.5 bg-white/20 rounded-2xl text-white">←</button>
    <h2 id="detail-obj-name" class="text-base font-extrabold text-white flex-grow">Objekt</h2>
  </header>

  <div class="p-5 space-y-3">
    <button onclick="openAction('inspection')" class="w-full p-5 bg-white rounded-3xl shadow-sm border text-left">
      <span class="font-bold">Monatsinspektion</span>
    </button>

    <button onclick="openAction('tasks')" class="w-full p-5 bg-white rounded-3xl shadow-sm border text-left">
      <span class="font-bold">Aufgaben-Board</span>
    </button>

    <button onclick="openAction('ve')" class="w-full p-5 bg-white rounded-3xl shadow-sm border text-left">
      <span class="font-bold">VE Vergabe</span>
    </button>
  </div>
</div>

<!-- Weitere Views (Form, Tasks, etc.) werden hier ergänzt -->

</div>

<script>
// ======================== STATE ========================
let S = {
  users: [{name:'Admin', pass:'admin123', role:'Admin', isApproved:true}],
  objects: [
    { id:1, name:"UW Badstraße", type:"UW" },
    { id:2, name:"UW Böllinger Höfe", type:"UW" }
  ],
  tasks: [],
  archive: [],
  ve: [],
  documentCounter: 0,
  currentUser: null,
  lastActivity: Date.now()
};

const SK = 'nhf_v8_5_final';
let activeObjId = null;
let photoData = null;
let taskPhotoData = null;

// Inactivity Timer (3 Stunden = 10800000 ms)
let inactivityTimer = null;
let warningTimer = null;
const INACTIVITY_LIMIT = 3 * 60 * 60 * 1000; // 3 Stunden
const WARNING_TIME = 60 * 1000; // 60 Sekunden

function resetInactivityTimer() {
  S.lastActivity = Date.now();
  clearTimeout(inactivityTimer);
  clearTimeout(warningTimer);

  inactivityTimer = setTimeout(() => {
    showInactivityWarning();
  }, INACTIVITY_LIMIT - WARNING_TIME);
}

function showInactivityWarning() {
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-[200]';
  modal.innerHTML = `
    <div class="bg-white rounded-3xl p-8 max-w-xs w-full text-center">
      <h3 class="text-xl font-bold text-red-600 mb-2">Inaktivität erkannt</h3>
      <p class="text-sm mb-4">Du wirst in <span id="countdown" class="font-bold text-red-600">60</span> Sekunden automatisch abgemeldet.</p>
      <button onclick="resetInactivityTimer(); this.closest('.fixed').remove()" class="w-full py-3 bg-green-600 text-white rounded-2xl font-bold">Ich bin noch da</button>
    </div>
  `;
  document.body.appendChild(modal);

  let seconds = 60;
  const countdownEl = modal.querySelector('#countdown');
  const interval = setInterval(() => {
    seconds--;
    countdownEl.textContent = seconds;
    if (seconds <= 0) {
      clearInterval(interval);
      modal.remove();
      logout();
    }
  }, 1000);
}

// Activity Listener
['click', 'touchstart', 'keydown', 'scroll'].forEach(event => {
  document.addEventListener(event, () => {
    if (S.currentUser) resetInactivityTimer();
  }, { passive: true });
});

// ======================== HELPERS ========================
function genId() { return 'nhf-' + Date.now() + '-' + Math.random().toString(36).substr(2,5); }

function save() { localStorage.setItem(SK, JSON.stringify(S)); }

function showView(id) {
  document.querySelectorAll('.view-panel').forEach(v => v.classList.add('hidden'));
  document.getElementById(id)?.classList.remove('hidden');
}

function toast(msg) {
  const t = document.getElementById('toast-el');
  t.innerText = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2200);
}

function getNextDocumentNumber(objName, type = 'INS') {
  S.documentCounter = (S.documentCounter || 0) + 1;
  save();
  const date = new Date();
  const yy = date.getFullYear();
  const dd = String(date.getDate()).padStart(2, '0');
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const hh = String(date.getHours()).padStart(2, '0');
  const min = String(date.getMinutes()).padStart(2, '0');
  const shortName = objName.replace(/[^a-zA-Z0-9]/g, '').substring(0, 12);
  return `${yy}-${shortName}-${dd}${mm}-${hh}${min}-${String(S.documentCounter).padStart(3, '0')}`;
}

// ======================== LOGIN ========================
async function handleLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  const user = S.users.find(x => x.name.toLowerCase() === u.toLowerCase());
  if (user && user.pass === p) {
    S.currentUser = user;
    showDashboard();
    resetInactivityTimer();
  } else {
    toast('Zugang verweigert');
  }
}

function logout() {
  S.currentUser = null;
  showView('view-login');
  clearTimeout(inactivityTimer);
  clearTimeout(warningTimer);
}

// ======================== DASHBOARD ========================
function showDashboard() {
  renderObjectList();
  showView('view-dashboard');
}

function renderObjectList() {
  const q = (document.getElementById('search-bar')?.value || '').toLowerCase();
  const filtered = S.objects.filter(o => o.name.toLowerCase().includes(q));
  
  document.getElementById('object-list').innerHTML = filtered.map(obj => {
    const openTasks = S.tasks.filter(t => t.objectId === obj.id && !t.done).length;
    return `
      <div onclick="selectObject(${obj.id})" class="p-5 bg-white rounded-3xl border cursor-pointer active:scale-[0.985]">
        <div class="flex justify-between">
          <div>
            <span class="text-xs font-black px-2 py-0.5 rounded text-white" style="background:#1e6b1e">${obj.type}</span>
            <h3 class="font-bold mt-1">${obj.name}</h3>
          </div>
          ${openTasks > 0 ? `<div class="text-red-500 text-xs font-bold">${openTasks} offen</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function selectObject(id) {
  activeObjId = id;
  const obj = S.objects.find(o => o.id === id);
  document.getElementById('detail-obj-name').innerText = obj.name;
  showView('view-detail');
}

// ======================== TASKS ========================
function openAction(action) {
  if (action === 'tasks') {
    showView('view-tasks');
    renderTasks();
  }
  if (action === 'inspection') {
    // Hier würde das verbesserte Inspektionsformular kommen
    toast('Monatsinspektion geöffnet (erweitert in Build 8.5)');
  }
  if (action === 've') {
    toast('VE Vergabe geöffnet');
  }
}

function renderTasks() {
  // Vereinfachte Task-Liste
  const container = document.getElementById('task-list') || document.createElement('div');
  // ... (wird in vollständiger Version erweitert)
}

// ======================== START ========================
function init() {
  const saved = localStorage.getItem(SK);
  if (saved) S = {...S, ...JSON.parse(saved)};
  
  // Demo User
  if (!S.users.find(u => u.name === 'Admin')) {
    S.users.push({name:'Admin', pass:'admin123', role:'Admin', isApproved:true});
  }
  
  showView('view-login');
}

window.onload = init;
</script>
</body>
</html>
