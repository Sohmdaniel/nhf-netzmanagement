version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    restart: unless-stopped

  pocketbase:
    image: pocketbase/pocketbase:latest
    command: serve --http=0.0.0.0:8090
    ports:
      - "8090:8090"
    volumes:
      - ./pocketbase/pb_data:/pb_data
    restart: unless-stopped